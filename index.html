<script>
// fallback úložisko, ak window.storage nie je k dispozícii (napr. otvorené mimo Claude)
if (!window.storage) {
  (function(){
    var mem = {};
    try { var saved = localStorage.getItem('swing-ptf-fallback'); if (saved) mem = JSON.parse(saved); } catch(e){}
    function persist(){ try { localStorage.setItem('swing-ptf-fallback', JSON.stringify(mem)); } catch(e){} }
    window.storage = {
      get: function(k){ return Promise.resolve(mem[k] != null ? {key:k, value:mem[k]} : null); },
      set: function(k,v){ mem[k]=v; persist(); return Promise.resolve({key:k, value:v}); },
      "delete": function(k){ delete mem[k]; persist(); return Promise.resolve({key:k, deleted:true}); },
      list: function(){ return Promise.resolve({keys:Object.keys(mem)}); }
    };
  })();
}
</script>

/* ---------------- indikátory ---------------- */
const sma = (a, n) => (a.length < n ? null : a.slice(-n).reduce((s, x) => s + x, 0) / n);
function rsi(closes, n = 14) {
  if (closes.length < n + 1) return null;
  let g = 0, l = 0;
  for (let i = 1; i <= n; i++) { const d = closes[i] - closes[i - 1]; if (d > 0) g += d; else l -= d; }
  let ag = g / n, al = l / n;
  for (let i = n + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    ag = (ag * (n - 1) + Math.max(d, 0)) / n;
    al = (al * (n - 1) + Math.max(-d, 0)) / n;
  }
  return al === 0 ? 100 : 100 - 100 / (1 + ag / al);
}
function atr(bars, n = 14) {
  if (bars.length < n + 1) return null;
  const trs = [];
  for (let i = 1; i < bars.length; i++) {
    const b = bars[i], p = bars[i - 1];
    trs.push(Math.max(b.h - b.l, Math.abs(b.h - p.c), Math.abs(b.l - p.c)));
  }
  let a = trs.slice(0, n).reduce((s, x) => s + x, 0) / n;
  for (let i = n; i < trs.length; i++) a = (a * (n - 1) + trs[i]) / n;
  return a;
}
function computeIndicators(values) {
  // values: newest-first from Twelve Data
  const bars = [...values].reverse().map(v => ({ o: +v.open, h: +v.high, l: +v.low, c: +v.close, v: +v.volume || 0, d: v.datetime }));
  if (bars.length < 2) return null;
  const closes = bars.map(b => b.c);
  const last = bars[bars.length - 1], prev = bars[bars.length - 2];
  const vols = bars.map(b => b.v).filter(v => v > 0);
  const avgVol20 = vols.length >= 20 ? vols.slice(-21, -1).reduce((s, x) => s + x, 0) / 20 : null;
  const a = atr(bars.slice(-120));
  return {
    price: last.c, prevClose: prev.c, changePct: (last.c / prev.c - 1) * 100,
    gapPct: prev.c ? (last.o / prev.c - 1) * 100 : 0,
    sma20: sma(closes, 20), sma50: sma(closes, 50), sma200: sma(closes, 200),
    rsi14: rsi(closes.slice(-120)), atr14: a, atrPct: a ? (a / last.c) * 100 : null,
    vol: last.v, avgVol20, volRatio: avgVol20 ? last.v / avgVol20 : null,
    hi20: Math.max(...closes.slice(-20)), lo20: Math.min(...closes.slice(-20)),
    lastDate: last.d, ts: Date.now(),
  };
}

/* ---------------- formátovanie ---------------- */
const f0 = (x) => x == null || isNaN(x) ? "—" : Math.round(x).toLocaleString("sk-SK");
const f2 = (x) => x == null || isNaN(x) ? "—" : (+x).toLocaleString("sk-SK", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fp = (x, d = 1) => x == null || isNaN(x) ? "—" : `${x >= 0 ? "+" : ""}${(+x).toFixed(d)} %`;
const fpn = (x, d = 1) => x == null || isNaN(x) ? "—" : `${(+x).toFixed(d)} %`;
const sevColor = (s) => s === "bad" ? C.bad : s === "warn" ? C.warn : s === "ok" ? C.ok : C.info;

/* ---------------- mini markdown render ---------------- */
function Md({ text }) {
  if (!text) return null;
  const lines = String(text).split("\n");
  const out = [];
  let list = [];
  const flush = (k) => { if (list.length) { out.push(<ul key={"u" + k} style={{ margin: "4px 0 10px", paddingLeft: 18 }}>{list}</ul>); list = []; } };
  const inline = (s) => {
    const parts = s.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((p, i) => p.startsWith("**") && p.endsWith("**")
      ? <strong key={i} style={{ color: C.text }}>{p.slice(2, -2)}</strong> : p);
  };
  lines.forEach((ln, i) => {
    const t = ln.trim();
    if (/^#{1,4}\s/.test(t)) { flush(i); out.push(<div key={i} style={{ fontWeight: 700, color: C.amber, margin: "12px 0 4px", fontSize: 13, textTransform: "uppercase", letterSpacing: ".06em" }}>{t.replace(/^#+\s/, "")}</div>); }
    else if (/^[-•*]\s/.test(t)) list.push(<li key={i} style={{ margin: "2px 0" }}>{inline(t.replace(/^[-•*]\s/, ""))}</li>);
    else if (t === "") flush(i);
    else { flush(i); out.push(<p key={i} style={{ margin: "4px 0" }}>{inline(t)}</p>); }
  });
  flush("end");
  return <div style={{ fontSize: 13, lineHeight: 1.55, color: C.text }}>{out}</div>;
}

/* ---------------- AI volanie ---------------- */
async function askClaude(prompt, useSearch = true) {
  const body = {
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    messages: [{ role: "user", content: prompt }],
  };
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
  });
  const data = await r.json();
  if (data.error) throw new Error(data.error.message || "API chyba");
  return (data.content || []).map(b => (b.type === "text" ? b.text : "")).filter(Boolean).join("\n");
}

const STRATEGY_BRIEF = `Pravidlá portfólia (Swing stratégia v1.0):
- Kategórie: A Long swing (6–24 mes., max 10 % NLV/pozícia, mäkký SL −20–25 % alebo 200d MA alebo zlom tézy; pri +50 % predaj 1/4, +100 % ďalšiu 1/4; po +30 % SL na break-even),
  B Swing (2 týž.–4 mes., max 6 % NLV, tvrdý SL −7–10 % pod swing low; 1/2 na +2R, po +1R SL na BE; časový stop 6–8 týždňov bez pohybu),
  C Špekulácia (dni–týždne, max 3 % NLV, tvrdý SL −10–15 % bracket, 1/2 na +20–30 %, časový stop 2–3 týždne, nedržať vo veľkom cez earnings).
- Riziko na tranžu max 1 % NLV (B/C) resp. 1,5 % (A). Páka max 1,3× normál, 1,5× absolútny strop. Excess Liquidity min 30 % NLV.
- Max 16 pozícií, max 40 % NLV na jednu tému. Do straty dokupuje len A s platnou tézou; B a C nikdy.
- Pri SPY −7 % od maxima: stop novým B/C vstupom, dotiahnuť SL. Pred earnings/CPI/FOMC žiadne nové vstupy.`;

/* ---------------- pravidlový engine ---------------- */
function buildAlerts(state, derived) {
  const { settings: s, positions } = state;
  const { totals, themes, byCat, mkt } = derived;
  const A = [];
  const add = (sev, scope, msg, action) => A.push({ sev, scope, msg, action });

  // Účet
  if (totals.lev > s.maxLevCrash) add("bad", "ÚČET", `Páka ${totals.lev.toFixed(2)}× nad absolútnym stropom ${s.maxLevCrash}×`, "Okamžite redukovať — najprv špekulácie, potom najslabšie swingy (kap. 3.4).");
  else if (totals.lev > s.maxLevNormal) add("warn", "ÚČET", `Páka ${totals.lev.toFixed(2)}× nad limitom ${s.maxLevNormal}× pre normálny trh`, "Redukuj na ≤1,3×; nové vstupy zakázané (Desatoro č. 1).");
  if (s.excessLiq < s.minExcessPct * s.nlv) add("bad", "ÚČET", `Excess Liquidity ${f0(s.excessLiq)} € < ${Math.round(s.minExcessPct * 100)} % NLV (${f0(s.minExcessPct * s.nlv)} €)`, "Znižuj páku, kým vankúš nie je obnovený.");
  const elVsPos = totals.value > 0 ? s.excessLiq / totals.value : 1;
  if (elVsPos < 0.15) add("bad", "ÚČET", `Excess Liq je len ${(elVsPos * 100).toFixed(0)} % hodnoty pozícií — poistka z kap. 3.4`, "Predávaj podľa poradia: špekulácie → slabé swingy → najslabší long swing.");
  if (positions.length > s.maxPositions) add("warn", "ÚČET", `${positions.length} pozícií > limit ${s.maxPositions}`, "Konsoliduj — zombie pozície von.");
  if (totals.riskPct > 0.08) add("warn", "ÚČET", `Otvorené riziko ${(totals.riskPct * 100).toFixed(1)} % NLV > 8 %`, "Dotiahni SL alebo zmenši pozície.");

  // Kategórie
  Object.entries(CATS).forEach(([k, c]) => {
    const cr = catRule(s, k);
    if (byCat[k].count > cr.maxCount) add("warn", "KATEGÓRIE", `${c.label}: ${byCat[k].count} pozícií > max ${cr.maxCount}`, "Zredukuj počet.");
  });
  const specVal = byCat.spec.value;
  if (specVal > 0.10 * s.nlv) add("warn", "KATEGÓRIE", `Špekulácie ${f0(specVal)} € > 10 % NLV`, "Špekulácie súhrnne max 10 % NLV (kap. 2.4).");

  // Témy
  themes.forEach(t => {
    if (t.pct > s.maxThemePct) add("warn", "TÉMY", `Téma „${t.name}“ = ${(t.pct * 100).toFixed(0)} % NLV > ${Math.round(s.maxThemePct * 100)} %`, "Jedna stávka, veľa tickerov — zredukuj na 1–2 najsilnejšie mená.");
  });

  // Trh
  if (mkt.spy) {
    if (mkt.spy.sma50 && mkt.spy.price < mkt.spy.sma50) add("warn", "TRH", "SPY pod 50d MA — režim risk-off", "Žiadne nové B/C vstupy bez výnimky; dotiahnuť SL (kap. 2.1).");
    if (mkt.spy.hiAll && mkt.spy.price < mkt.spy.hiAll * 0.93) add("warn", "TRH", `SPY ${((mkt.spy.price / mkt.spy.hiAll - 1) * 100).toFixed(1)} % od maxima (cez −7 %)`, "Obranný režim: stop novým vstupom, páka pod 1,1× (kap. 2.5).");
  }
  const vix = parseFloat(s.vixManual);
  if (!isNaN(vix) && vix > 28) add("warn", "TRH", `VIX ${vix} > 28 — zvýšené riziko`, "Páka ≤1,0×, žiadny margin úver (kap. 4).");

  // Pozície
  derived.rows.forEach(r => {
    const p = r.p;
    const cr = catRule(s, p.cat);
    if (!p.thesis || p.thesis.trim().length < 5) add("warn", p.ticker, "Chýba téza jednou vetou", "„Vlastním X, lebo Y, držím kým platí Z“ — inak pozícia nepatrí do portfólia.");
    if (!p.sl) add("bad", p.ticker, "Chýba stop-loss", "SL je zadaný, nie myslený (Desatoro č. 5).");
    if (r.pctNlv > cr.maxPct * 1.02) add("warn", p.ticker, `${(r.pctNlv * 100).toFixed(1)} % NLV > max ${(cr.maxPct * 100).toFixed(0)} % pre ${CATS[p.cat].label}`, "Zredukuj na limit kategórie.");
    const riskLim = p.cat === "long" ? s.riskTrancheLong : s.riskTrancheSwing;
    if (r.riskPct > riskLim * 1.6) add("warn", p.ticker, `Riziko k SL ${(r.riskPct * 100).toFixed(2)} % NLV (limit na tranžu ${(riskLim * 100).toFixed(1)} %)`, "Posuň SL bližšie / zmenši pozíciu (pozícia z viacerých tranží môže byť vyššie, ale strop stráž).");
    if (p.sl && r.price != null) {
      if (r.price <= p.sl) add("bad", p.ticker, `Cena ${f2(r.price)} ≤ SL ${f2(p.sl)}`, p.cat === "long" ? "Mäkký SL: rozhoduje týždenná sviečka + téza — over a konaj podľa plánu." : "Tvrdý SL zasiahnutý — výstup, žiadne posúvanie nadol.");
      else if ((r.price - p.sl) / r.price < 0.03) add("warn", p.ticker, `Cena ${f2(r.price)} < 3 % od SL ${f2(p.sl)}`, "Priprav exekúciu, nerozhoduj v emócii po zatvorení.");
    }
    if (p.tp1 && r.price != null && r.price >= p.tp1) add("ok", p.ticker, `TP1 ${f2(p.tp1)} dosiahnutý (cena ${f2(r.price)})`, p.cat === "spec" ? "Realizuj 1/2, zvyšok trailing/časový stop." : p.cat === "swing" ? "Realizuj 1/2 na +2R, SL na break-even." : "Zváž redukciu 1/4 do sily, zvyšok nechaj bežať.");
    if (r.pnlPct != null) {
      if (p.cat === "long" && r.pnlPct >= (s.longBePct || 30) && p.sl < p.avg) add("ok", p.ticker, `+${r.pnlPct.toFixed(0)} % — long swing nad +${s.longBePct || 30} %`, "Presuň SL minimálne na break-even (kap. 3.1).");
      if (p.cat === "swing" && p.sl && r.price != null) {
        const r1 = p.avg + (p.avg - p.sl);
        if (r.price >= r1 && p.sl < p.avg) add("ok", p.ticker, "Swing dosiahol +1R", "SL na break-even (kap. 3.2).");
      }
    }
    // časové stopy
    if (p.date && cr.timeStopDays > 0) {
      const days = (Date.now() - new Date(p.date).getTime()) / 86400000;
      if (p.cat === "swing" && days > cr.timeStopDays && r.pnlPct != null && Math.abs(r.pnlPct) < 3) add("warn", p.ticker, `Swing ${Math.round(days)} dní bez pohybu (±0)`, `Časový stop ${cr.timeStopDays} dní — zavri, kapitál má pracovať.`);
      if (p.cat === "spec" && days > cr.timeStopDays) add("warn", p.ticker, `Špekulácia beží ${Math.round(days)} dní`, `Časový stop ${cr.timeStopDays} dní — uzavri alebo zdôvodni v denníku.`);
    }
    // technika
    const m = r.m;
    if (m) {
      if (m.rsi14 != null && m.rsi14 > 78) add("info", p.ticker, `RSI ${m.rsi14.toFixed(0)} — eufória`, p.cat === "long" ? "Zóna na redukciu do sily, nie na dokup." : "Zvaž realizáciu časti zisku.");
      if (m.rsi14 != null && m.rsi14 < 30) add("info", p.ticker, `RSI ${m.rsi14.toFixed(0)} — prepredané`, "Dokup len ak je to A-kategória s platnou tézou (kap. 2.2).");
      if (m.sma200 && m.price < m.sma200 && p.cat === "long") add("warn", p.ticker, "Cena pod 200d MA", "Tézový/technický stop pre long swing — over týždenný graf (kap. 3.1).");
      if (m.sma50 && m.price < m.sma50 && p.cat === "swing") add("info", p.ticker, "Cena pod 50d MA", "Setup slabne — skontroluj swing low / SL.");
      if (m.gapPct != null && Math.abs(m.gapPct) >= 3) add(m.gapPct < 0 ? "warn" : "info", p.ticker, `Gap ${fp(m.gapPct)} na otvorení`, "Over správy/earnings — gap býva katalyzátor aj varovanie.");
      if (m.volRatio != null && m.volRatio >= 2 && Math.abs(m.changePct) >= 2) add("info", p.ticker, `Objem ${m.volRatio.toFixed(1)}× priemer pri ${fp(m.changePct)}`, "Inštitucionálna aktivita — pozri news/insider/analyst zmeny.");
    }
  });

  // Watchlist proximita
  state.watchlist.forEach(w => {
    const m = derived.mkt.tickers[w.ticker];
    if (w.level === "A" && m && w.zoneLow && w.zoneHigh && m.price >= +w.zoneLow && m.price <= +w.zoneHigh) {
      add("ok", w.ticker + " (WL)", `Cena ${f2(m.price)} vo vstupnej zóne ${w.zoneLow}–${w.zoneHigh}`, "Kandidát na vstup — over 5 otázok z kap. 2.1 a kapacitu (páka, počet, téma).");
    }
  });

  const order = { bad: 0, warn: 1, ok: 2, info: 3 };
  return A.sort((a, b) => order[a.sev] - order[b.sev]);
}

/* ---------------- import parser ---------------- */
function parseImport(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (!lines.length) return [];
  const delim = lines[0].includes("\t") ? "\t" : lines[0].includes(";") ? ";" : ",";
  const rows = lines.map(l => l.split(delim).map(c => c.replace(/^"|"$/g, "").trim()));
  const head = rows[0].map(h => h.toLowerCase());
  const idx = (...keys) => head.findIndex(h => keys.some(k => h.includes(k)));
  let iT = idx("symbol", "ticker", "fin"), iQ = idx("quantity", "position", "ks", "množ", "mnoz", "qty"),
    iA = idx("cost", "avg", "priem"), iP = idx("last", "mark", "price", "cena", "akt");
  let data = rows.slice(1);
  if (iT < 0) { iT = 0; iQ = 1; iA = 2; iP = 3; data = rows; } // bez hlavičky
  const num = (s) => { const n = parseFloat(String(s).replace(/\s/g, "").replace(",", ".")); return isNaN(n) ? null : n; };
  return data.map((r, i) => {
    const t = (r[iT] || "").toUpperCase().replace(/[^A-Z0-9.\-]/g, "");
    if (!t || t === "TOTAL") return null;
    return { id: "imp" + Date.now() + i, ticker: t, cat: "swing", theme: "Iné", thesis: "", date: new Date().toISOString().slice(0, 10), qty: num(r[iQ]) || 0, avg: num(r[iA]) || 0, manualPrice: num(r[iP]) || num(r[iA]) || 0, sl: "", tp1: "", note: "import — doplň kategóriu, tézu, SL" };
  }).filter(Boolean);
}

/* ---------------- cloud sync (IBKR Flex → Apps Script → JSON) ---------------- */
function mergeCloudPositions(existing, cloudRows) {
  // cloudRows: [{ticker, qty, avg, price}] — zachová kategóriu, tému, tézu, SL, TP existujúcich pozícií
  const byT = Object.fromEntries(existing.map(p => [p.ticker.toUpperCase(), p]));
  const seen = new Set();
  const merged = cloudRows.map((r, i) => {
    const t = String(r.ticker || r.symbol || "").toUpperCase().trim();
    if (!t) return null;
    seen.add(t);
    const old = byT[t];
    const qty = +r.qty || +r.position || 0;
    const avg = +r.avg || +r.costBasisPrice || +r.cost || 0;
    const price = +r.price || +r.markPrice || avg;
    if (old) return { ...old, qty, avg: avg || old.avg, manualPrice: price || old.manualPrice };
    return { id: "cl" + Date.now() + i, ticker: t, cat: "swing", theme: "Iné", thesis: "", date: new Date().toISOString().slice(0, 10), qty, avg, manualPrice: price, sl: "", tp1: "", note: "cloud sync — doplň kategóriu, tézu, SL" };
  }).filter(Boolean);
  const closed = existing.filter(p => !seen.has(p.ticker.toUpperCase()));
  return { merged, closedTickers: closed.map(p => p.ticker) };
}

  const pushState = useCallback(async (manual) => {
    const st = stateRef.current;
    const u = st.settings.cloudUrl?.trim();
    if (!u || (!st.settings.stateSync && !manual)) return;
    try {
      const savedAt = new Date().toISOString();
      const payload = { settings: st.settings, positions: st.positions, watchlist: st.watchlist, journal: st.journal, savedAt };
      const r = await fetch(stateUrl(u), { method: "POST", body: JSON.stringify(payload) });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || "neočakávaná odpoveď");
      savedAtRef.current = savedAt;
      setSyncMsg(`Stav uložený do cloudu ${new Date().toLocaleTimeString("sk-SK")} ✓`);
    } catch (e) {
      if (manual) setSyncMsg(`Uloženie stavu zlyhalo: ${e.message}${/Failed to fetch/i.test(e.message) ? " (v Claude sandboxe sync nefunguje — funguje na webe/mobile/stiahnutej verzii)" : ""}`);
    }
  }, []);

  const pullState = useCallback(async (manual) => {
    const u = stateRef.current.settings.cloudUrl?.trim();
    if (!u) { if (manual) setSyncMsg("Zadaj URL cloud endpointu."); return; }
    try {
      const r = await fetch(stateUrl(u));
      const j = await r.json();
      if (j.error) throw new Error(j.error);
      if (j.empty || !j.positions) { if (manual) setSyncMsg("V cloude zatiaľ nie je uložený žiadny stav — ulož ho z tohto zariadenia."); return; }
      if (!manual && j.savedAt && savedAtRef.current && j.savedAt <= savedAtRef.current) return; // lokálny je novší
      setState(st => ({
        settings: { ...DEFAULT_SETTINGS, ...j.settings, catRules: { long: catRule(j.settings || {}, "long"), swing: catRule(j.settings || {}, "swing"), spec: catRule(j.settings || {}, "spec") } },
        positions: j.positions, watchlist: j.watchlist || st.watchlist, journal: j.journal || st.journal,
      }));
      savedAtRef.current = j.savedAt || new Date().toISOString();
      setSyncMsg(`Stav načítaný z cloudu (uložený ${j.savedAt ? new Date(j.savedAt).toLocaleString("sk-SK") : "?"}) ✓`);
    } catch (e) {
      if (manual) setSyncMsg(`Načítanie stavu zlyhalo: ${e.message}${/Failed to fetch/i.test(e.message) ? " (v Claude sandboxe sync nefunguje — funguje na webe/mobile/stiahnutej verzii)" : ""}`);
    }
  }, []);

  const fetchCloud = useCallback(async (url) => {
    const u = (url ?? state.settings.cloudUrl).trim();
    if (!u) { setCloud(c => ({ ...c, msg: "Zadaj URL cloud endpointu v Nastaveniach." })); return; }
    setCloud({ busy: true, msg: "Sťahujem dáta z cloudu…", closed: [] });
    try {
      const r = await fetch(u, { redirect: "follow" });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      const rows = Array.isArray(j) ? j : j.positions || [];
      if (!rows.length) throw new Error("Endpoint nevrátil žiadne pozície (skontroluj Flex Query a skript).");
      setState(st => {
        const { merged, closedTickers } = mergeCloudPositions(st.positions, rows);
        setCloud({ busy: false, msg: `Synchronizované ${merged.length} pozícií${j.generated ? ` (dáta IBKR: ${j.generated})` : ""} o ${new Date().toLocaleTimeString("sk-SK")}.`, closed: closedTickers });
        const settings = { ...st.settings };
        if (j.nlv) settings.nlv = Math.round(+j.nlv);
        if (j.excessLiq) settings.excessLiq = Math.round(+j.excessLiq);
        return { ...st, settings, positions: merged };
      });
    } catch (e) {
      setCloud({ busy: false, msg: `Cloud sync zlyhal: ${e.message}. Ak ti URL v prehliadači ukazuje JSON, sandbox appky blokuje pripojenie — použi vloženie JSON v paneli Import nižšie (funguje vždy).`, closed: [] });
    }
  }, [state.settings.cloudUrl]);

  /* auto cloud sync pri otvorení */
  const cloudOnce = useRef(false);

  /* trhové dáta */
  const fetchAll = useCallback(async (force = false) => {
    const key = state.settings.tdKey.trim();
    if (!key) { setFetchStatus("Bez API kľúča — používam manuálne ceny. Kľúč zadáš v Nastaveniach."); return; }
    const tickers = [...new Set([...state.positions.map(p => p.ticker), ...state.watchlist.filter(w => w.level === "A").map(w => w.ticker), "SPY"])];
    const fresh = (t) => market.tickers[t] && Date.now() - market.tickers[t].ts < 10 * 60000;
    const todo = tickers.filter(t => force || !fresh(t) || (t === "SPY" && !market.spy));
    if (!todo.length) { setFetchStatus("Dáta sú čerstvé (<10 min)."); return; }
    let done = 0;
    for (const t of todo) {
      setFetchStatus(`Načítavam ${t}… (${done + 1}/${todo.length}; free limit ≈ 8/min)`);
      try {
        const r = await fetch(`https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(t)}&interval=1day&outputsize=250&apikey=${encodeURIComponent(key)}`);

        if (j.status === "error") throw new Error(j.message);

            return { tickers: nt, spy };

        setFetchStatus(`${t}: ${e.message}. Pokračujem…`);

      done++;
      if (done < todo.length) await new Promise(res => setTimeout(res, 8200));

Moje existujúce tickery (tieto NEnavrhuj): ${have || "žiadne"}.
Zameranie hľadania: ${scoutTheme || "kdekoľvek"}${scoutNote ? `; doplňujúce kritériá: ${scoutNote}` : ""}.

Postupuj ako analytik podľa mojej metódy hľadania bottleneckov: (1) capex oznámenia veľkých hráčov → kto je úzke hrdlo dodávok; (2) signály z earnings callov dodávateľov („sold out", „lead time", „kapacita rezervovaná"); (3) druhý a tretí rad benefitu trendu (prvý rad už býva zacenený); (4) penetračné krivky 10–50 %; (5) smer revízií odhadov FY+1/FY+2.

\`\`\`json
[{"ticker":"XYZ","theme":"jedna z: ${THEMES.join(" | ")}","thesis":"...","catalyst":"...","entry":"...","invalidate":"..."}]
\`\`\`

              <button key={k} onClick={() => setTab(k)} style={{
                background: "transparent", border: "none", borderBottom: `2px solid ${tab === k ? C.amber : "transparent"}`,
                color: tab === k ? C.text : C.mut, padding: "9px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: SANS,
              }}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "18px 20px" }}>
        {tab === "dash" && Dashboard()}
        {tab === "pos" && Positions()}
        {tab === "wl" && Watchlist()}
        {tab === "alerts" && Alerts()}
        {tab === "journal" && JournalTab()}
        {tab === "scout" && ScoutTab()}
        {tab === "ai" && AITab()}
        {tab === "rules" && RulesTab()}
        {tab === "imp" && ImportTab()}
      </div>
    </div>
  );
}

const tdN = { padding: "8px", textAlign: "right", fontFamily: MONO, color: "#8C97A6", whiteSpace: "nowrap" };

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
